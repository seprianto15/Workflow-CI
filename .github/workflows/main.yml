name: Students Performance Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: 'MLProject/data/final_data_students.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # Checks-out repository under $GITHUB_WORKSPACE
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      # Check Env Variables
      - name: Check Env
        run: |
          echo 'CSV URL is ${{ env.CSV_URL }}'
        
      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow seaborn

      - name: Clear environment
        run: |
          rm -rf MLProject/mlruns
      
      # Run MLflow Project
      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      # Read and Set Run ID
      - name: Get latest Mlflow run_id
        run: |
          EXPERIMENT_ID=$(cat MLProject/experiment_run_id.txt)
          MODEL_ID=$(cat MLProject/model_run_id.txt)
          
          echo "EXPERIMENT_ID=$EXPERIMENT_ID" >> $GITHUB_ENV
          echo "MODEL_ID=$MODEL_ID" >> $GITHUB_ENV
          
          echo "Experiment ID: $EXPERIMENT_ID"
          echo "Model ID: $MODEL_ID"

      # Save models to GitHub Repository
      - name: Upload to Github
        run: |
          git config --global user.name "${{ secrets.username }}"
          git config --global user.email "${{ secrets.email }}"
          # Karena mlruns ada di dalam MLProject, maka:
          git add MLProject/mlruns/
          git add MLProject/experiment_run_id.txt
          git add MLProject/model_run_id.txt
          git commit -m "Save mlruns from CI run (Experiment ID: ${{ env.EXPERIMENT_ID }}, Model ID: ${{ env.MODEL_ID }})" || true
          git pull origin main --rebase
          git push origin main
      


          