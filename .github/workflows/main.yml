name: Students Performance Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: 'MLProject/data/final_data_students.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # Checks-out repository under $GITHUB_WORKSPACE
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Check Env Variables
      - name: Check Env
        run: |
          echo 'CSV URL is ${{ env.CSV_URL }}'
        
      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f MLProject/requirements.txt ]; then
            pip install -r MLProject/requirements.txt
          else
            pip install mlflow scikit-learn pandas numpy matplotlib seaborn
          fi

      # Clear cache mlruns
      - name: Clear environment
        run: |
          find . -name "mlruns" -type d -exec rm -rf {} +
      
      # Run MLflow Project
      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      # Read and Set Run ID
      - name: Get latest Mlflow run_id
        run: |
          cd MLProject
          
          RUN_ID=$(ls -t mlruns/0 | head -n 1)
          echo "Captured RUN_ID: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      # Save models to GitHub Repository
      - name: Upload to Github
        run: |
          git config --global user.name "${{ secrets.username }}"
          git config --global user.email "${{ secrets.email }}"
          git add -f MLProject/mlruns/
          git add MLProject/run_id.txt
          git commit -m "Save mlruns from CI run (Run ID: ${{ env.RUN_ID }})" || true
          git pull origin main --rebase
          git push origin main
      
      - name: Build Docker Model
        run: |
          cd MLProject
          mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "cc" --env-manager=virtualenv
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      
      - name: Tag Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest


          