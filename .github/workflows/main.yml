name: Students Performance Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CSV_URL: 'MLProject/data/final_data_students.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # Checks-out repository under $GITHUB_WORKSPACE
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Check Env Variables
      - name: Check Env
        run: |
          echo 'CSV URL is ${{ env.CSV_URL }}'
      
      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f MLProject/requirements.txt ]; then
            pip install -r MLProject/requirements.txt
          else
            pip install mlflow scikit-learn pandas numpy matplotlib seaborn
          fi
      
      # Run MLflow Project
      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/seprianto15/Workflow-CI.mlflow
        run: |
          cd MLProject
          mlflow run . --env-manager local

      - name: Read and Set Run ID
        run: |
          cd MLProject
          # Membaca isi file run_id.txt yang diekspor dari skrip Python
          RUN_ID=$(cat run_id.txt)
          echo "Captured MLFLOW_RUN_ID: $RUN_ID"
          
          # Mendaftarkan RUN_ID ke environment GitHub Actions agar step selanjutnya bisa akses
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV