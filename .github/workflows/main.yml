name: Students Performance Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: 'MLProject/data/final_data_students.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # Checks-out repository under $GITHUB_WORKSPACE
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      # Check Env Variables
      - name: Check Env
        run: |
          echo 'CSV URL is ${{ env.CSV_URL }}'
        
      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow seaborn

      - name: Clear environment
        run: |
          rm -rf MLProject/mlruns
      
      # Run MLflow Project
      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      # Read and Set Run ID
      - name: Get latest Mlflow run_id
        run: |
          RUN_ID=$(cat MLProject/run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"
  
      # Save models to GitHub Repository
      - name: Upload to Github
        run: |
          git config --global user.name "${{ secrets.username }}"
          git config --global user.email "${{ secrets.email }}"
          # Karena mlruns ada di dalam MLProject, maka:
          git add MLProject/mlruns/
          git add MLProject/run_id.txt
          git commit -m "Save mlruns from CI run (Run ID: ${{ env.RUN_ID }})" || true
          git pull origin main --rebase
          git push origin main

      - name: Build Docker Model
        run: |
        env:
          # Mengatur env var agar MLflow tahu di mana folder mlruns berada
          MLFLOW_TRACKING_URI: file://${{ github.workspace }}/MLProject/mlruns
        run: |
          echo "Building model for Run ID: ${{ env.RUN_ID }}"
          mlflow models build-docker \
            --model-uri "runs:/${{ env.RUN_ID }}/model" \
            --name "cc"


          